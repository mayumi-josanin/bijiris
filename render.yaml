services:
  - type: web
    name: bijiris-app
    runtime: python
    plan: starter
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildCommand: "mkdir -p \"$BIJIRIS_DATA_DIR\""
    startCommand: "python3 server.py --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: BIJIRIS_DATA_DIR
        value: /opt/render/project/src/render-data
      - key: BIJIRIS_HOST
        value: 0.0.0.0
    disk:
      name: bijiris-data
      mountPath: /opt/render/project/src/render-data
      sizeGB: 5
